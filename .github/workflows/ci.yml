name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [staging]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nbes_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ci-only-not-a-real-secret-key
      JWT_SECRET_KEY: ci-only-jwt-secret-key
      DBENGINE: postgresql
      DBNAME: nbes_test
      DBUSER: postgres
      DBPASSWORD: postgres
      DBHOST: localhost
      DBPORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      NBES_REDIS_URL: redis://localhost:6379/0
      KEYCLOAK_ENABLED: "False"
      KAFKA_ENABLED: "False"
      VAULT_DEV_MODE: "True"
      MINIO_ENABLED: "False"
      CELERY_TASK_ALWAYS_EAGER: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # System libraries required by python-magic (file type detection)
      # and weasyprint (PDF generation). These mirror the Dockerfile apt installs.
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libmagic1 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-xlib-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fontconfig

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-django bandit ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Security scan with bandit
        run: bandit -r apps/ shared/ -ll --exclude ./apps/cert_trigger/tests/,./apps/committee/tests/,./apps/itembank/tests/,./apps/marking/tests/,./apps/notifications/tests/,./apps/registration/tests/,./apps/reporting/tests/,./apps/resit/tests/,./apps/results/tests/,./apps/sitting/tests/,./apps/sla/tests/,./apps/users/tests/

      - name: Django system check
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate

      - name: Run tests
        run: pytest --verbosity=2

  docker:
    name: Build and push Docker image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rfd-tech/nbes-backend:dev
            ghcr.io/rfd-tech/nbes-backend:dev-${{ github.sha }}
