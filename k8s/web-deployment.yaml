apiVersion: apps/v1
kind: Deployment
metadata:
  name: nbes-web
  namespace: nbes
  labels:
    app.kubernetes.io/name: nbes-web
    app.kubernetes.io/part-of: nbes-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nbes-web
  template:
    metadata:
      labels:
        app: nbes-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      
      # Init container to automatically run migrations before starting the web container
      initContainers:
        - name: run-migrations
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: nbes-config
            - secretRef:
                name: nbes-secrets
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi

      containers:
        - name: web
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: nbes-config
            - secretRef:
                name: nbes-secrets
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /admin/login/
              port: 8000
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /admin/login/
              port: 8000
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nbes-web-svc
  namespace: nbes
  labels:
    app.kubernetes.io/name: nbes-web
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: nbes-web
