apiVersion: v1
kind: Secret
metadata:
  name: nbes-secrets
  namespace: nbes
  labels:
    app.kubernetes.io/name: nbes
type: Opaque
# stringData allows writing values in plain text for convenience.
# Kubernetes will automatically base64 encode them when applied.
# Copy this file to k8s/secret.yaml (ignored or not committed) and populate:
stringData:
  SECRET_KEY: "replace-with-a-very-secure-random-key"
  
  # PostgreSQL Credentials (must match the database environment)
  DBUSER: "postgres"
  DBPASSWORD: "replace-with-a-secure-db-password"
  
  # Optional/Required integrations based on config
  JWT_SECRET_KEY: "replace-with-a-secure-jwt-key"
  SYSTEM_17_HMAC_SECRET: "replace-with-a-secure-secret"
  SYSTEM_20_WEBHOOK_SECRET: "replace-with-a-secure-webhook-secret"
  SYSTEM_21_API_KEY: "replace-with-a-secure-api-key"
  NLEMS_API_KEY: "replace-with-a-secure-nlems-api-key"
  SYSTEM_14_SERVICE_TOKEN: "replace-with-a-secure-service-token"
  
  # MinIO credentials (if enabled)
  MINIO_ACCESS_KEY: "replace-with-a-secure-access-key"
  MINIO_SECRET_KEY: "replace-with-a-secure-secret-key"
