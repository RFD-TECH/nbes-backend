apiVersion: apps/v1
kind: Deployment
metadata:
  name: nbes-worker-marking
  namespace: nbes
  labels:
    app.kubernetes.io/name: nbes-worker-marking
    app.kubernetes.io/part-of: nbes-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nbes-worker-marking
  template:
    metadata:
      labels:
        app: nbes-worker-marking
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command: ["celery", "-A", "config", "worker", "--loglevel=info", "-Q", "marking-high", "-c", "4"]
          envFrom:
            - configMapRef:
                name: nbes-config
            - secretRef:
                name: nbes-secrets
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 512Mi
---
