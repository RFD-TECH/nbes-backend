---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nbes-beat
  namespace: nbes
  labels:
    app.kubernetes.io/name: nbes-beat
    app.kubernetes.io/part-of: nbes-backend
spec:
  replicas: 1
  # Strategy Recreate is critical for Celery Beat to prevent duplicate scheduler execution during rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nbes-beat
  template:
    metadata:
      labels:
        app: nbes-beat
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: beat
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command: ["celery", "-A", "config", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: nbes-config
            - secretRef:
                name: nbes-secrets
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
